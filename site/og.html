<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Klaxon — OG image source (1200×630)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;900&family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --paper: #F4F1E9; --white: #fff; --ink: #0A0A0A; --alarm: #FF2D1A; --shadow: #0A0A0A;
    --mono: "IBM Plex Mono", monospace; --display: "Archivo Black", sans-serif;
    --grid: rgba(10,10,10,0.07);
  }
  html, body { width: 1200px; height: 630px; }
  body {
    background: var(--paper); color: var(--ink);
    font-family: var(--mono);
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 44px 44px;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  .og { display: flex; width: 1200px; height: 630px; }
  .left {
    flex: 1;
    padding: 60px 40px 58px 64px;
    display: flex; flex-direction: column; justify-content: space-between;
    border-right: 3px solid var(--ink);
  }
  .brand { display: flex; align-items: center; gap: 16px; }
  .brand .mark {
    width: 58px; height: 58px; background: var(--alarm); border: 3px solid var(--ink);
    display: grid; place-items: center; box-shadow: 5px 5px 0 var(--shadow);
  }
  .brand .name { font-family: var(--display); font-size: 44px; letter-spacing: 0.02em; }
  h1 {
    font-family: var(--display); font-size: 78px; line-height: 0.9; text-transform: uppercase;
    letter-spacing: -0.01em; max-width: 14ch;
  }
  h1 .red { color: var(--alarm); }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .chip {
    font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 8px 12px; border: 2px solid var(--ink); background: var(--paper);
  }
  .url { font-size: 17px; font-weight: 700; letter-spacing: 0.04em; color: var(--alarm); margin-top: 14px; }
  .right { width: 476px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; padding: 40px 48px; }
  .terminal { width: 100%; border: 3px solid var(--ink); background: var(--white); box-shadow: 12px 12px 0 var(--shadow); }
  .tbar { display: flex; align-items: center; gap: 8px; padding: 10px 14px; border-bottom: 3px solid var(--ink); background: var(--paper); }
  .tbar i { width: 12px; height: 12px; border: 1.5px solid var(--ink); border-radius: 50%; display: block; }
  .tbar i.a { background: var(--alarm); } .tbar i.b { background: var(--paper); } .tbar i.c { background: var(--ink); }
  .tbar .t { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-left: 6px; }
  .alert {
    background:
      repeating-linear-gradient(45deg, rgba(10,10,10,0.03) 0 2px, transparent 2px 9px),
      linear-gradient(160deg, #FF6A4D 0%, #FF2D1A 55%, #C21200 100%);
    padding: 30px 24px 28px; text-align: center; color: #fff;
  }
  .pill { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 6px 14px; background: rgba(0,0,0,0.28); border: 1.5px solid rgba(255,255,255,0.55); border-radius: 999px; margin-bottom: 16px; }
  .pill .d { width: 9px; height: 9px; background: #7CFF6B; border-radius: 50%; }
  .mt { font-family: var(--display); font-size: 44px; text-transform: uppercase; line-height: 0.95; text-shadow: 3px 3px 0 rgba(0,0,0,0.22); margin-bottom: 8px; }
  .mtime { font-size: 14px; letter-spacing: 0.14em; color: rgba(255,255,255,0.9); margin-bottom: 14px; }
  .count { font-family: var(--mono); font-weight: 700; font-size: 68px; line-height: 1; margin-bottom: 20px; text-shadow: 4px 4px 0 rgba(0,0,0,0.2); }
  .join { display: inline-flex; align-items: center; gap: 10px; background: #fff; color: var(--ink); border: 2px solid var(--ink); box-shadow: 4px 4px 0 rgba(0,0,0,0.45); padding: 12px 18px; font-family: var(--mono); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.06em; border-radius: 999px; }
  .join .ret { font-size: 12px; min-width: 24px; height: 22px; display: inline-grid; place-items: center; padding: 0 6px; background: var(--paper); border: 1.5px solid var(--ink); border-radius: 4px; box-shadow: 0 2px 0 var(--ink); }
</style>
</head>
<body>
  <div class="og">
    <div class="left">
      <div class="brand">
        <span class="mark"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="square"><path d="M4 14 L13 6 V20 L4 16 Z"/><path d="M17 9 C19 11 19 13 17 15"/><path d="M20 6 C23 9 23 15 20 18"/></svg></span>
        <span class="name">KLAXON</span>
      </div>
      <h1>YOU WILL <span class="red">NOT</span> MISS THE MEETING.</h1>
      <div>
        <div class="chips">
          <span class="chip">FREE &amp; OPEN SOURCE</span>
          <span class="chip">PRIVACY-FIRST</span>
          <span class="chip">macOS 14+</span>
        </div>
        <div class="url">sleonia.github.io/klaxon</div>
      </div>
    </div>
    <div class="right">
      <div class="terminal">
        <div class="tbar"><i class="a"></i><i class="b"></i><i class="c"></i><span class="t">KLAXON.ALERT</span></div>
        <div class="alert">
          <div class="pill"><span class="d"></span>WORK</div>
          <div class="mt">DESIGN REVIEW</div>
          <div class="mtime">15:44 – 16:14</div>
          <div class="count">2:00</div>
          <div class="join"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0A0A0A" stroke-width="2.2" stroke-linecap="square"><path d="M3 7h11v10H3z"/><path d="M14 10l6-3v10l-6-3"/></svg> JOIN VIDEO CALL <span class="ret">↵</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
